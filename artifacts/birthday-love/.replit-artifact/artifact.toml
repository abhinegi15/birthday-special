kind = "web"
previewPath = "/"
title = "Happy Birthday — A Love Letter"
version = "1.0.0"
id = "artifacts/birthday-love"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20131

[services.development]
run = "pnpm --filter @workspace/birthday-love run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/birthday-love", "run", "build" ]
publicDir = "artifacts/birthday-love/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20131"
BASE_PATH = "/"
